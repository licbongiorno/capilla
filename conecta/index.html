    <style>
        /* Ajustes específicos para esta página */
        html, body { 
            height: auto; overflow: visible; overflow-x: hidden; background-color: var(--bg);
        }

        /* Colores Tierra (Basados en tu diseño original) */
        :root {
            --bg: #F5F5F0;
            --card: #FFFFFF;
            --accent: #C19A6B;
            --primario: #5D4037;
            --texto: #2D2D2D;
        }

        body.dark-mode {
            --bg: #1A1512;
            --card: #2D241F;
            --accent: #D4AF37;
            --primario: #F5F5F0;
            --texto: #EAEAEA;
        }

        /* Botón de donación a la derecha */
        .float-help { left: auto !important; right: 20px !important; }

        /* Contenedor App para centrar en PC */
        .app-container {
            max-width: 500px;
            margin: 120px auto 100px;
            padding: 0 20px;
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--primario); margin: 0; }
        .subtitle { font-style: italic; opacity: 0.8; margin-top: 10px; color: var(--texto); }

        /* Estilo Acordeón Mejorado */
        .accordion {
            background: var(--card); color: var(--primario); cursor: pointer;
            padding: 20px; width: 100%; text-align: left; border: none;
            outline: none; transition: 0.4s; display: flex; align-items: center;
            justify-content: space-between; font-weight: 700; font-size: 1rem;
            border-radius: 15px; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .accordion.active { border-bottom-left-radius: 0; border-bottom-right-radius: 0; background: var(--primario); color: #fff; }
        .accordion i.main-icon { margin-right: 15px; font-size: 1.2rem; color: var(--accent); }
        .accordion.active i.main-icon { color: #fff; }

        .panel {
            padding: 0 20px; background-color: var(--card); max-height: 0;
            overflow: hidden; transition: max-height 0.3s ease-out;
            border-bottom-left-radius: 15px; border-bottom-right-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .panel-content { padding: 20px 0; }
        
        /* Links dentro del acordeón */
        .conecta-link {
            display: flex; align-items: center; padding: 12px;
            text-decoration: none; color: var(--texto); border-radius: 10px;
            transition: 0.2s; margin-bottom: 5px;
        }
        .conecta-link:hover { background: rgba(193, 154, 107, 0.1); color: var(--primario); }
        .conecta-link i { width: 30px; color: var(--accent); }

        /* Navegación Cápsula */
        .top-navbar {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 400px;
            background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3); border-radius: 50px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        body.dark-mode .top-navbar { background: rgba(0,0,0,0.4); border-color: rgba(255,255,255,0.1); }
        .top-navbar .logo-text { font-family: 'Playfair Display', serif; font-weight: 700; color: var(--primario); font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="toast" id="toast">¡Copiado con éxito!</div>

    <script src="config-global.js"></script>
    <script>
        // Lógica de Acordeón
        const acc = document.getElementsByClassName("accordion");
        for (let i = 0; i < acc.length; i++) {
            acc[i].addEventListener("click", function() {
                this.classList.toggle("active");
                const arrow = this.querySelector(".arrow");
                arrow.classList.toggle("fa-chevron-up");
                arrow.classList.toggle("fa-chevron-down");
                
                const panel = this.nextElementSibling;
                if (panel.style.maxHeight) {
                    panel.style.maxHeight = null;
                } else {
                    panel.style.maxHeight = panel.scrollHeight + "px";
                } 
            });
        }

        // Modales y Otros
        function abrirModal() { document.getElementById('modalHelp').style.display = 'flex'; setTimeout(() => document.getElementById('modalHelp').classList.add('show'), 10); }
        function cerrarModal() { document.getElementById('modalHelp').classList.remove('show'); setTimeout(() => document.getElementById('modalHelp').style.display = 'none', 300); }
        function copiarAlias() { navigator.clipboard.writeText(CONFIG_CAPILLA.donaciones.alias).then(() => { document.getElementById('toast').classList.add('show'); setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000); }); }
        
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('darkIcon');
            icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        window.onload = () => {
            if(localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkIcon').className = 'fas fa-sun';
            }
        };
    </script>
