<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Glosario de la Fe | Capilla Santa Ana</title>
    
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-TZ6QSWZ6');</script>

    <link rel="stylesheet" href="master-estilos.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* VARIABLES EXACTAS DE TU WEB PRINCIPAL */
        :root {
            --primario: #5D4037; --acento: #C19A6B; --fondo: #F5F5F0; --blanco: #FFFFFF;
            --texto: #2D2D2D; --verde-wa: #25D366; --gold-light: rgba(193, 154, 107, 0.2); 
            --sombra: 0 10px 30px rgba(0,0,0,0.08); --sombra-fuerte: 0 15px 40px rgba(93, 64, 55, 0.15);
        }
        body.dark-mode {
            --primario: #E0C097; --acento: #D4A373; --fondo: #121212; --blanco: #1E1E1E; 
            --texto: #E0E0E0; --sombra: 0 10px 30px rgba(0,0,0,0.5); --sombra-fuerte: 0 15px 40px rgba(0, 0, 0, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; background-color: var(--fondo); color: var(--texto); font-family: 'Montserrat', sans-serif; }

        /* --- CABECERA (NAV) IGUAL AL INDEX --- */
        nav { position: fixed; top: 0; width: 100%; height: 80px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; border-bottom: 1px solid var(--gold-light); transition: 0.3s; }
        body.dark-mode nav { background: rgba(18,18,18,0.95); }
        .logo { font-size: 1.2rem; font-weight: 800; color: var(--primario); text-transform: uppercase; letter-spacing: 1.5px; }
        .nav-links { display: flex; list-style: none; gap: 20px; transition: 0.3s ease-in-out; }
        .nav-links a { text-decoration: none; color: var(--texto); font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .nav-links a i { display: none; }
        .nav-links a:hover { color: var(--acento); }
        .nav-actions { display: flex; gap: 20px; align-items: center; }
        .icon-btn { background: none; border: none; cursor: pointer; color: var(--primario); font-size: 1.3rem; transition: 0.3s; }
        .icon-btn:hover { color: var(--acento); }
        .menu-toggle { display: none; flex-direction: column; justify-content: space-between; width: 28px; height: 20px; background: none; border: none; cursor: pointer; z-index: 1001; }
        .menu-toggle span { display: block; width: 100%; height: 3px; background-color: var(--primario); border-radius: 3px; transition: all 0.3s ease-in-out; }
        body.dark-mode .menu-toggle span { background-color: var(--acento); }
        .menu-toggle.active span:nth-child(1) { transform: translateY(8.5px) rotate(45deg); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); }

        @media (max-width: 900px) {
            .menu-toggle { display: flex; }
            .nav-links { position: absolute; top: 80px; left: 0; width: 100%; background: var(--blanco); flex-direction: column; align-items: flex-start; max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.4s ease-in-out, opacity 0.3s ease-in-out, padding 0.3s ease; box-shadow: var(--sombra-fuerte); z-index: 999; gap: 0; }
            body.dark-mode .nav-links { background: #1a1a1a; border-top: 1px solid #333; }
            .nav-links.active { max-height: calc(100vh - 80px); opacity: 1; padding: 10px 0 30px 0; overflow-y: auto; }
            .nav-links li { width: 100%; text-align: left; border-bottom: 1px solid var(--gold-light); }
            body.dark-mode .nav-links li { border-bottom: 1px solid #333; }
            .nav-links li:last-child { border-bottom: none; }
            .nav-links a { display: flex; align-items: center; gap: 15px; padding: 22px 8%; font-size: 1.1rem; font-weight: 700; text-transform: none; }
            .nav-links a i { display: inline-block; font-size: 1.3rem; color: var(--acento); width: 25px; text-align: center; }
        }

        /* --- BOTÓN DONACIÓN A LA DERECHA ESTRICTO --- */
        .float-help {
            position: fixed;
            bottom: 30px;
            right: 30px !important; /* Siempre a la derecha */
            left: auto !important;  /* Cancela cualquier left viejo */
            z-index: 100; background: linear-gradient(135deg, var(--acento), var(--primario)); 
            border: none; color: #fff; width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 1.6rem; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); cursor: pointer;
        }

        @media (max-width: 768px) {
            .float-help { right: 20px !important; bottom: 20px; width: 55px; height: 55px; font-size: 1.4rem; }
        }

        /* --- CUERPO DEL GLOSARIO --- */
        .main-container { padding: 130px 5% 100px; max-width: 800px; margin: 0 auto; }
        
        .section-header { text-align: center; margin-bottom: 40px; }
        .section-header h2 { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--primario); margin-bottom: 15px; }
        .section-header p.subtitle { font-size: 1.1rem; opacity: 0.9; margin: 0 auto; }
        .divider { width: 60px; height: 4px; background: var(--acento); margin: 20px auto; border-radius: 2px; }

        .search-box { display: flex; align-items: center; background: var(--blanco); border-radius: 50px; padding: 15px 25px; box-shadow: var(--sombra); border: 1px solid var(--gold-light); transition: 0.3s; margin-bottom: 40px; }
        .search-box i { color: var(--acento); font-size: 1.2rem; margin-right: 15px; }
        .search-box input { border: none; background: transparent; outline: none; width: 100%; font-family: 'Montserrat', sans-serif; font-size: 1.05rem; color: var(--texto); font-weight: 500; }

        .terms-grid { display: flex; flex-direction: column; gap: 20px; }
        .term-card { background: var(--blanco); border-radius: 20px; padding: 30px; box-shadow: var(--sombra); border-left: 5px solid var(--acento); transition: transform 0.3s; }
        .term-card:hover { transform: translateY(-5px); box-shadow: var(--sombra-fuerte); }
        .term-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .term-badge { background: var(--gold-light); color: var(--primario); padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .share-btn { background: transparent; border: none; color: var(--texto); font-size: 1.3rem; cursor: pointer; opacity: 0.5; transition: 0.3s; }
        .share-btn:hover { color: var(--acento); opacity: 1; transform: scale(1.1); }
        .term-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--primario); margin: 0 0 10px; font-weight: 700; }
        .term-desc { font-size: 1.05rem; line-height: 1.7; margin: 0; }

        .no-results { text-align: center; padding: 40px 20px; font-style: italic; opacity: 0.7; display: none; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Capilla Santa Ana</div>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html" onclick="closeMenu()"><i class="fas fa-home"></i> Inicio</a></li>
            <li><a href="profundiza.html" onclick="closeMenu()"><i class="fas fa-layer-group"></i> Profundizá</a></li>
            <li><a href="#" onclick="abrirModal(); closeMenu()"><i class="fas fa-heart"></i> Donar</a></li>
        </ul>
        <div class="nav-actions">
            <button class="icon-btn" aria-label="Cambiar modo oscuro" onclick="toggleDarkMode()"><i class="fas fa-moon" id="darkIcon"></i></button>
            <button class="menu-toggle" aria-label="Abrir menú" onclick="toggleMenu()">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <button class="float-help" onclick="abrirModal()" title="Ayudar a la Capilla">
        <i class="fas fa-hand-holding-heart"></i>
    </button>

    <main class="main-container">
        <div class="section-header">
            <p style="text-transform:uppercase; letter-spacing:2px; font-size:0.9rem; color:var(--acento); font-weight: 700;">Glosario de la Fe</p>
            <h2>Palabras de Luz</h2>
            <div class="divider"></div>
            <p class="subtitle">Buscá y descubrí el significado de los términos más usados en la Iglesia para comprender mejor nuestra fe.</p>
        </div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="buscador" placeholder="Buscar palabra (ej: Eucaristía, Amén)..." onkeyup="filtrarGlosario()">
        </div>

        <div id="noResults" class="no-results">
            <i class="fas fa-book-open" style="font-size: 2rem; color: var(--acento); margin-bottom: 15px;"></i><br>
            No encontramos esa palabra. Probá buscar un sinónimo.
        </div>

        <div id="listaTerminos" class="terms-grid"></div>
    </main>

    <script src="config-global.js"></script>
    <script src="glosario-data.js"></script> 
    
    <script>
        // --- NAVEGACIÓN ---
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('active');
            document.querySelector('.menu-toggle').classList.toggle('active');
        }
        function closeMenu() {
            if(window.innerWidth <= 900) {
                document.getElementById('navLinks').classList.remove('active');
                document.querySelector('.menu-toggle').classList.remove('active');
            }
        }

        // --- MODO OSCURO ---
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('darkIcon');
            icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }

        // --- GLOSARIO LOGIC ---
        const contenedor = document.getElementById('listaTerminos');
        const msjNoResults = document.getElementById('noResults');

        function renderizarGlosario(terminos) {
            contenedor.innerHTML = '';
            if (terminos.length === 0) {
                msjNoResults.style.display = 'block';
            } else {
                msjNoResults.style.display = 'none';
                terminos.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'term-card';
                    card.innerHTML = `
                        <div class="term-header">
                            <span class="term-badge">${item.categoria || 'Término'}</span>
                            <button class="share-btn" onclick="compartirTermino('${item.termino.replace(/'/g, "\\'")}', '${item.definicion.replace(/'/g, "\\'")}')" title="Compartir">
                                <i class="fas fa-share-nodes"></i>
                            </button>
                        </div>
                        <h3 class="term-title">${item.termino}</h3>
                        <p class="term-desc">${item.definicion}</p>
                    `;
                    contenedor.appendChild(card);
                });
            }
        }

        function filtrarGlosario() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const filtrados = glosarioTerminos.filter(t => 
                t.termino.toLowerCase().includes(texto) || 
                t.definicion.toLowerCase().includes(texto)
            );
            renderizarGlosario(filtrados);
        }

        async function compartirTermino(titulo, definicion) {
            const msg = `📖 *${titulo}*\\n${definicion}\\n\\nAprendé más en la web de la Capilla Santa Ana: ${window.location.href}`;
            if (navigator.share) {
                await navigator.share({ title: titulo, text: msg });
            } else {
                navigator.clipboard.writeText(msg);
                alert("¡Definición copiada al portapapeles!");
            }
        }

        // Inicialización
        window.onload = () => {
            if(typeof glosarioTerminos !== 'undefined') {
                glosarioTerminos.sort((a, b) => a.termino.localeCompare(b.termino));
                renderizarGlosario(glosarioTerminos);
            }
            if(localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('darkIcon').className = 'fas fa-sun';
            }
        };
    </script>
</body>
</html>
