<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Abrazo de Dios | Capilla Santa Ana</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../master-estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div id="nav-placeholder"></div>
    <nav class="master-nav">
        <a href="../index.html" class="logo-container">
            <img src="../icono.png" alt="Logo" class="nav-logo-img">
            <span class="logo-texto">Capilla Santa Ana</span>
        </a>
        <div class="nav-right">
            <ul class="nav-links" id="navLinks">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="mazos.html">Mazos</a></li>
                <li><a href="#" onclick="toggleModal('modalOfrenda')">Ofrenda</a></li>
            </ul>
            <div class="nav-actions">
                <button class="icon-btn" onclick="toggleDarkMode()"><i class="fas fa-moon" id="darkIcon"></i></button>
                <button class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <main style="padding-top: 140px; text-align: center; min-height: 80vh;">
        <h2 id="mazoTitle" style="font-family: 'Playfair Display'; color: var(--acento);">Abrazo de Dios</h2>
        <div class="card-scene">
            <div class="card-display" id="cardBox">
                <i class="fas fa-hand-holding-heart card-icon"></i>
                <div class="card-text" id="cardText">Cargando reflexión...</div>
            </div>
        </div>
        <div class="mazo-actions">
            <button class="btn-card btn-share" onclick="compartirWA()"><i class="fab fa-whatsapp"></i> Compartir</button>
            <button class="btn-card btn-next" onclick="proximaCarta()">Siguiente <i class="fas fa-arrow-right"></i></button>
        </div>
    </main>

    <div id="modalOfrenda" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="toggleModal('modalOfrenda')">&times;</button>
            <i class="fas fa-heart" style="font-size: 3rem; color: var(--acento);"></i>
            <h3>Sumá tu Corazón</h3>
            <p>Tu ofrenda nos ayuda a sostener estos espacios de paz.</p>
            <div class="alias-box" style="background:var(--fondo); padding:15px; border-radius:12px; font-weight:700; margin:15px 0;">capillas.fatima.ag</div>
            <button class="btn-card btn-next" style="width:100%; justify-content:center;" onclick="copiarAlias()">Copiar Alias</button>
        </div>
    </div>

    <script src="../config-global.js"></script>
    <script>
        const mazoData = {
            titulo: "Abrazo de Dios",
            preguntas: [
                "¿Qué parte de tu corazón necesita hoy un consuelo que solo el silencio puede dar?",
                "Si pudieras soltar una sola carga hoy, ¿cuál elegirías para volver a caminar liviano?",
                "¿Dónde sentiste la paz de Dios en medio del ruido de esta semana?",
                "¿A quién podrías llevarle hoy un 'abrazo' de esperanza con un simple mensaje?",
                "¿Qué miedo te gustaría entregarle a Jesús para que Él lo transforme en fortaleza?"
            ]
        };
        let currentIdx = 0;
        document.getElementById('cardText').innerText = mazoData.preguntas[0];
        function proximaCarta() {
            const card = document.getElementById('cardBox');
            card.classList.add('changing');
            setTimeout(() => {
                currentIdx = (currentIdx + 1) % mazoData.preguntas.length;
                document.getElementById('cardText').innerText = mazoData.preguntas[currentIdx];
                card.classList.remove('changing');
            }, 400);
        }
        function compartirWA() {
            const txt = mazoData.preguntas[currentIdx];
            window.open(`https://wa.me/?text=${encodeURIComponent("✨ Reflexión de la Capilla:\n\n\"" + txt + "\"\n\nLeela acá: " + window.location.href)}`, '_blank');
        }
    </script>
</body>
</html>
