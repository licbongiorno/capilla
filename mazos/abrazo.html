<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Abrazo de Dios | Capilla Santa Ana</title>
    
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-TZ6QSWZ6');</script>
    
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../master-estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TZ6QSWZ6" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <nav>
        <a href="../index.html" class="logo-container">
            <img src="../icono.png" alt="Logo" class="nav-logo-img">
            <span class="logo-texto">Capilla Santa Ana</span>
        </a>
        <div class="nav-right">
            <ul class="nav-links" id="navLinks">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="mazos.html">Mazos</a></li>
                <li><a href="../profundiza.html">Profundizá</a></li>
                <li><a href="#" onclick="toggleModal('modalOfrenda')">Ofrenda</a></li>
            </ul>
            <div class="nav-actions">
                <button class="icon-btn" onclick="toggleDarkMode()"><i class="fas fa-moon" id="darkIcon"></i></button>
                <button class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <main style="padding-top: 140px; text-align: center; min-height: 85vh;">
        <h2 id="mazoTitle" style="font-family: 'Playfair Display'; color: var(--acento); margin-bottom: 5px;">Abrazo de Dios</h2>
        <p style="font-size: 0.85rem; opacity: 0.6; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;">Consuelo y Esperanza</p>
        
        <div class="card-scene">
            <div class="card-display" id="cardBox">
                <i class="fas fa-hand-holding-heart card-icon" style="color: #80CBC4;"></i>
                <div class="card-text" id="cardText">Cargando reflexión...</div>
            </div>
        </div>

        <div class="mazo-actions">
            <button class="btn-card btn-share" onclick="compartirWA()"><i class="fab fa-whatsapp"></i> Compartir</button>
            <button class="btn-card btn-next" onclick="proximaCarta()">Siguiente <i class="fas fa-arrow-right"></i></button>
        </div>
    </main>

    <div class="float-container">
        <button class="f-btn" onclick="toggleModal('modalOfrenda')" title="Sumá tu Corazón">
            <i class="fas fa-heart"></i>
        </button>
    </div>

    <div id="modalOfrenda" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="toggleModal('modalOfrenda')">&times;</button>
            <i class="fas fa-heart" style="font-size: 3rem; color: var(--acento); margin-bottom: 15px;"></i>
            <h3>Sumá tu Corazón</h3>
            <p style="font-size: 0.9rem; margin-bottom: 20px;">Tu ofrenda nos ayuda a sostener estos espacios de paz.</p>
            <div class="alias-box">capillas.fatima.ag</div>
            <button class="btn-card btn-next" style="width:100%; justify-content:center;" onclick="copiarAlias()">Copiar Alias</button>
        </div>
    </div>

    <script src="data-abrazo.js"></script> 
    <script src="../config-global.js"></script>

    <script>
        // 3. BUSCAMOS CÓMO SE LLAMA LA VARIABLE EN TU ARCHIVO JS
        // Esto revisa los nombres más comunes que pudimos haberle puesto.
        let listaPreguntas = [];
        
        if (typeof preguntas !== 'undefined') { listaPreguntas = preguntas; }
        else if (typeof preguntasAbrazo !== 'undefined') { listaPreguntas = preguntasAbrazo; }
        else if (typeof dataAbrazo !== 'undefined') { listaPreguntas = dataAbrazo; }
        else if (typeof abrazo !== 'undefined') { listaPreguntas = abrazo; }
        else {
            // Si no encuentra ninguna, muestra este mensaje para avisarte.
            listaPreguntas = ["⚠️ Error: El HTML no encuentra cómo se llama la variable en tu archivo data-abrazo.js. Por favor, revisá la primera línea de ese archivo."];
        }

        const mazoData = {
            titulo: "Abrazo de Dios",
            preguntas: listaPreguntas
        };

        // Elegimos una carta al azar al entrar
        let currentIdx = Math.floor(Math.random() * mazoData.preguntas.length);

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('cardText').innerText = mazoData.preguntas[currentIdx];
        });

        function proximaCarta() {
            const card = document.getElementById('cardBox');
            card.classList.add('changing');
            
            setTimeout(() => {
                // Selecciona otra al azar (para aprovechar las 72 preguntas)
                let newIdx;
                do {
                    newIdx = Math.floor(Math.random() * mazoData.preguntas.length);
                } while (newIdx === currentIdx && mazoData.preguntas.length > 1);
                
                currentIdx = newIdx;
                document.getElementById('cardText').innerText = mazoData.preguntas[currentIdx];
                card.classList.remove('changing');
            }, 400);
        }

        function compartirWA() {
            const txt = mazoData.preguntas[currentIdx];
            const url = window.location.href;
            const link = `https://wa.me/?text=${encodeURIComponent("✨ Una pregunta para el alma:\n\n" + "\"" + txt + "\"\n\nReflexioná acá: " + url)}`;
            window.open(link, '_blank');
        }

        function copiarAlias() {
            navigator.clipboard.writeText("capillas.fatima.ag");
            alert("¡Alias copiado! Muchas gracias por tu generosidad.");
        }
    </script>
</body>
</html>
