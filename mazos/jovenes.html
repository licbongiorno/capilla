<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Jóvenes | Capilla Santa Ana</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../master-estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>.card-cita { font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--acento); margin-top: 25px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }</style>
</head>
<body>
    <nav><a href="../index.html" class="logo-container"><img src="../icono.png" class="nav-logo-img"><span class="logo-texto">Capilla Santa Ana</span></a><div class="nav-right"><ul class="nav-links" id="navLinks"><li><a href="../index.html">Inicio</a></li><li><a href="mazos.html">Mazos</a></li><li><a href="../profundiza.html">Profundizá</a></li><li><a href="https://capillasantaana.com.ar/ofrenda">Ofrenda</a></li></ul><div class="nav-actions"><button class="icon-btn" onclick="toggleDarkMode()"><i class="fas fa-moon" id="darkIcon"></i></button><button class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></button></div></div></nav>
    <main style="padding-top: 140px; text-align: center; min-height: 85vh;">
        <h2 id="mazoTitle" style="font-family: 'Playfair Display'; color: var(--acento);">Horizontes Nuevos</h2>
        <p style="font-size: 0.85rem; opacity: 0.6; margin-bottom: 20px; text-transform: uppercase;">Jóvenes</p>
        <div class="card-scene"><div class="card-display" id="cardBox"><i class="fas fa-bolt card-icon" style="color: #00BCD4;"></i><div class="card-text" id="cardText" style="white-space: pre-wrap;">Cargando...</div><div class="card-cita" id="cardCita"></div></div></div>
        <div class="mazo-actions"><button class="btn-card btn-share" onclick="compartirWA()"><i class="fab fa-whatsapp"></i> Compartir</button><button class="btn-card btn-next" onclick="proximaCarta()">Siguiente <i class="fas fa-arrow-right"></i></button></div>
    </main>
    <div class="float-container"><a href="https://capillasantaana.com.ar/ofrenda" class="f-btn"><i class="fas fa-heart"></i></a></div>
    <script src="data-jovenes.js"></script><script src="../config-global.js"></script>
    <script>
        let mazoPreguntas = typeof CARTAS_JOVENES !== 'undefined' ? CARTAS_JOVENES : [{ q: "Error: No se encontró CARTAS_JOVENES", a: "Soporte" }];
        let currentIdx = Math.floor(Math.random() * mazoPreguntas.length);
        document.addEventListener('DOMContentLoaded', actualizarCartaDOM);
        function actualizarCartaDOM() { document.getElementById('cardText').innerText = mazoPreguntas[currentIdx].q; document.getElementById('cardCita').innerText = "— " + mazoPreguntas[currentIdx].a; }
        function proximaCarta() { const card = document.getElementById('cardBox'); card.classList.add('changing'); setTimeout(() => { currentIdx = Math.floor(Math.random() * mazoPreguntas.length); actualizarCartaDOM(); card.classList.remove('changing'); }, 400); }
        function compartirWA() { window.open(`https://wa.me/?text=${encodeURIComponent("✨ Reflexión de la Capilla:\n\n\"" + mazoPreguntas[currentIdx].q + "\"\n(" + mazoPreguntas[currentIdx].a + ")\n\n" + window.location.href)}`, '_blank'); }
    </script>
</body>
</html>
