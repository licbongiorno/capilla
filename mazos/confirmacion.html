<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Confirmación | Capilla Santa Ana</title>
    
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);})(window,document,'script','dataLayer','GTM-TZ6QSWZ6');</script>
    
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="../master-estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TZ6QSWZ6" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <nav>
        <a href="../index.html" class="logo-container">
            <img src="../icono.png" alt="Logo" class="nav-logo-img">
            <span class="logo-texto">Capilla Santa Ana</span>
        </a>
        <div class="nav-right">
            <ul class="nav-links" id="navLinks">
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="mazos.html">Mazos</a></li>
                <li><a href="../profundiza.html">Profundizá</a></li>
                <li><a href="#" onclick="toggleModal('modalOfrenda')">Ofrenda</a></li>
            </ul>
            <div class="nav-actions">
                <button class="icon-btn" onclick="toggleDarkMode()"><i class="fas fa-moon" id="darkIcon"></i></button>
                <button class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <main style="padding-top: 140px; text-align: center; min-height: 85vh;">
        <h2 id="mazoTitle" style="font-family: 'Playfair Display'; color: var(--acento); margin-bottom: 5px;">Testigos del Espíritu</h2>
        <p style="font-size: 0.85rem; opacity: 0.6; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;">Fuego y Misión</p>
        
        <div class="card-scene">
            <div class="card-display" id="cardBox">
                <i class="fas fa-dove card-icon" style="color: #E67E22;"></i>
                <div class="card-text" id="cardText">Cargando reflexión...</div>
            </div>
        </div>

        <div class="mazo-actions">
            <button class="btn-card btn-share" onclick="compartirWA()"><i class="fab fa-whatsapp"></i> Compartir</button>
            <button class="btn-card btn-next" onclick="proximaCarta()">Siguiente <i class="fas fa-arrow-right"></i></button>
        </div>
    </main>

    <div class="float-container">
        <button class="f-btn" onclick="toggleModal('modalOfrenda')" title="Sumá tu Corazón">
            <i class="fas fa-hand-holding-heart"></i>
        </button>
    </div>

    <div id="modalOfrenda" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="toggleModal('modalOfrenda')">&times;</button>
            <i class="fas fa-heart" style="font-size: 3rem; color: var(--acento); margin-bottom: 15px;"></i>
            <h3>Sumá tu Corazón</h3>
            <p style="font-size: 0.9rem; margin-bottom: 20px;">Tu generosidad ayuda a que el fuego del Espíritu llegue a más personas.</p>
            <div class="alias-box">capillas.fatima.ag</div>
            <button class="btn-card btn-next" style="width:100%; justify-content:center;" onclick="copiarAlias()">Copiar Alias</button>
        </div>
    </div>

    <script src="../config-global.js"></script>
    <script>
        const mazoData = {
            titulo: "Testigos del Espíritu",
            preguntas: [
                "¿Qué don creés que Dios puso en vos para ayudar a los demás?",
                "¿En qué momento de tu vida necesitás que el Espíritu Santo te dé más valentía?",
                "¿Cómo podés ser hoy un testigo de Jesús en las redes sociales o con tu ejemplo?",
                "¿Qué parte de tu carácter te gustaría que el Espíritu Santo transforme hoy?",
                "¿Sentís el fuego de Dios en tu corazón o sentís que necesitás reavivarlo?"
            ]
        };
        let currentIdx = 0;
        document.getElementById('cardText').innerText = mazoData.preguntas[0];
        function proximaCarta() {
            const card = document.getElementById('cardBox');
            card.classList.add('changing');
            setTimeout(() => {
                currentIdx = (currentIdx + 1) % mazoData.preguntas.length;
                document.getElementById('cardText').innerText = mazoData.preguntas[currentIdx];
                card.classList.remove('changing');
            }, 400);
        }
        function compartirWA() {
            const txt = mazoData.preguntas[currentIdx];
            window.open(`https://wa.me/?text=${encodeURIComponent("✨ Una pregunta para confirmar mi fe:\n\n\"" + txt + "\"\n\nLeela acá: " + window.location.href)}`, '_blank');
        }
    </script>
</body>
</html>
