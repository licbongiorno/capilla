<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Testigos del Espíritu - Capilla Santa Ana</title>
    
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-TZ6QSWZ6');</script>
    
    <link rel="stylesheet" href="../master-estilos.css">
    <link rel="stylesheet" href="cartas.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        :root {
            --bg: #0a0a0b; 
            --card-back: #2b1d17; 
            --accent: #E67E22; 
            --primario: #4E342E;
        }
        body.dark-mode {
            --bg: #050505; --card-back: #3e2723; --accent: #ff9800; --primario: #fbe9e7;
        }
    </style>
</head>
<body>
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TZ6QSWZ6" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

    <div class="bg-words" id="bg"></div>

    <nav class="top-navbar">
        <div class="logo-text">Santa Ana</div>
        <div class="controls">
            <a href="../index.html" class="icon-btn" title="Ir al Inicio"><i class="fas fa-home"></i></a>
            <a href="index.html" class="icon-btn" title="Ver más Mazos"><i class="fas fa-layer-group"></i></a>
            <button class="icon-btn" onclick="toggleDarkMode()" title="Modo Noche"><i class="fas fa-moon" id="darkIcon"></i></button>
        </div>
    </nav>

    <button class="float-help" onclick="abrirModal()" title="Ayudar a la Capilla">
        <i class="fas fa-hand-holding-heart"></i>
    </button>

    <div class="app-wrapper">
        <h1>Testigos</h1>
        
        <div class="scene-wrapper">
            <div class="scene" id="scene">
                <div class="card" id="tarjeta" onclick="flipCard()">
                    <div class="card__face card__face--front">
                        <i class="fa-solid fa-fire-flame-curved" style="font-size: 5rem; color: var(--accent); margin-bottom: 20px; filter: drop-shadow(0 4px 15px rgba(230, 126, 34, 0.4));"></i>
                        <h2 style="font-family: 'Playfair Display', serif; margin:0; font-size: 1.8rem;">El Espíritu</h2>
                        <p style="font-size: 0.95rem; opacity: 0.9; margin-top: 15px; font-weight: 500; border-top: 1px solid rgba(230, 126, 34, 0.3); padding-top: 10px;">Tocá para descubrir</p>
                    </div>
                    
                    <div class="card__face card__face--back">
                        <i class="fa-solid fa-wind" style="font-size: 1.5rem; color: var(--card-back); opacity: 0.15; margin-bottom: 10px;"></i>
                        <p class="pregunta" id="textoFrase"></p>
                        <p class="autor" id="textoAutor"></p>
                        <div style="font-size: 0.75rem; letter-spacing: 2px; color: var(--accent); font-weight: 800; margin-top: 15px;">CONFIRMACIÓN</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-bar" id="actionBar">
            <button class="btn-nav" id="btnAnterior" onclick="moverCarta('izq')" disabled><i class="fas fa-arrow-left"></i></button>
            <button class="btn-share" onclick="shareReflexion(event)"><i class="fas fa-share-nodes"></i> Compartir</button>
            <button class="btn-nav" id="btnSiguiente" onclick="moverCarta('der')"><i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <div id="modalHelp" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="cerrarModal()">&times;</button>
            <i class="fas fa-church" style="font-size: 3rem; color: var(--accent);"></i>
            <span class="section-title">Ofrenda de Amor</span>
            <p class="copy-donar-dinero" style="font-size: 0.9rem; margin: 0;"></p>
            <div class="alias-box alias-global"></div>
            <button class="btn-action" style="background: var(--primario); color: white;" onclick="copiarAlias(event)">Copiar Alias Bancario</button>
            <span class="section-title">Ofrenda de Vida</span>
            <p class="copy-donar-talento" style="font-size: 0.9rem; margin: 0 0 15px;"></p>
            <a href="https://wa.me/5493517023789" target="_blank" class="btn-action" style="background: #25D366; color: white;">
                <i class="fab fa-whatsapp"></i> Ofrecer mi talento
            </a>
        </div>
    </div>

    <div class="toast" id="toast">¡Copiado con éxito!</div>

    <script src="../config-global.js"></script>
    <script src="data-confirmacion.js"></script>
    
    <script>
        let isFlipped = false;
        const card = document.getElementById('tarjeta');
        const scene = document.getElementById('scene');
        const actionBar = document.getElementById('actionBar');
        let historyStack = [];
        let currentPos = -1;

        const synth = new Tone.PolySynth(Tone.Synth).toDestination();
        synth.set({ oscillator: { type: "sine" }, envelope: { attack: 0.05, release: 0.4 } });

        function vibrar(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

        function initBG() {
            const bg = document.getElementById('bg');
            const words = ['FUEGO', 'DONES', 'LUZ', 'ESPÍRITU', 'TESTIGO'];
            for (let i = 0; i < 15; i++) {
                const s = document.createElement('span');
                s.className = 'floating-word';
                s.textContent = words[Math.floor(Math.random() * words.length)];
                s.style.left = Math.random() * 100 + 'vw';
                s.style.fontSize = (14 + Math.random() * 20) + 'px';
                s.style.animation = `floatUp ${20 + Math.random() * 20}s linear infinite`;
                bg.appendChild(s);
            }
        }

        function inicializarCarta(id = null) {
            let idx = (id) ? CARTAS_CONFIRMACION.findIndex(c => c.id === id) : -1;
            if (idx === -1) idx = Math.floor(Math.random() * CARTAS_CONFIRMACION.length);
            historyStack.push(CARTAS_CONFIRMACION[idx]);
            currentPos = 0;
            pintarCarta(historyStack[currentPos]);
        }

        function pintarCarta(carta) {
            document.getElementById('textoFrase').innerText = carta.q;
            document.getElementById('textoAutor').innerText = carta.a;
            window.history.replaceState(null, '', `?id=${carta.id}`);
            document.getElementById('btnAnterior').disabled = (currentPos <= 0);
        }

        function flipCard() {
            if (!isFlipped) {
                vibrar(40);
                card.classList.add('is-flipped');
                isFlipped = true;
                actionBar.classList.add('visible');
                try { Tone.start(); synth.triggerAttackRelease(["E4", "A4"], "16n"); } catch(e){}
            }
        }

        function moverCarta(dir) {
            if(!isFlipped) return;
            vibrar(30);
            try { Tone.start(); synth.triggerAttackRelease("G4", "32n"); } catch(e){}
            const claseSalida = (dir === 'der') ? 'swipe-left' : 'swipe-right';
            const claseEntrada = (dir === 'der') ? 'swipe-right' : 'swipe-left';
            scene.classList.add(claseSalida);
            setTimeout(() => {
                if (dir === 'der') {
                    currentPos++;
                    if (currentPos >= historyStack.length) historyStack.push(CARTAS_CONFIRMACION[Math.floor(Math.random() * CARTAS_CONFIRMACION.length)]);
                } else { currentPos--; }
                pintarCarta(historyStack[currentPos]);
                scene.classList.remove(claseSalida);
                scene.classList.add(claseEntrada);
                requestAnimationFrame(() => { setTimeout(() => scene.classList.remove(claseEntrada), 50); });
            }, 300);
        }

        function shareReflexion() {
            vibrar(30);
            const msg = `🔥 Testigos del Espíritu - Capilla Santa Ana:\n\n"${document.getElementById('textoFrase').innerText}"\n\nEncendé tu fe aquí: ${window.location.href}`;
            if (navigator.share) { navigator.share({ title: 'Confirmación', text: msg }); }
            else { navigator.clipboard.writeText(msg).then(mostrarToast); }
        }

        function abrirModal() { vibrar(30); const m = document.getElementById('modalHelp'); m.style.display = 'flex'; setTimeout(() => m.classList.add('show'), 10); }
        function cerrarModal() { const m = document.getElementById('modalHelp'); m.classList.remove('show'); setTimeout(() => m.style.display = 'none', 300); }
        function copiarAlias() { vibrar([30,50,30]); navigator.clipboard.writeText(CONFIG_CAPILLA.donaciones.alias).then(mostrarToast); }
        function mostrarToast() { const t = document.getElementById('toast'); t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

        function toggleDarkMode() {
            vibrar(20); document.body.classList.toggle('dark-mode');
            const icon = document.getElementById('darkIcon');
            icon.className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }

        window.onload = () => {
            initBG();
            if(localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode'); document.getElementById('darkIcon').className = 'fas fa-sun';
            }
            const p = new URLSearchParams(window.location.search);
            inicializarCarta(p.get('id'));
        };
    </script>
</body>
</html>
